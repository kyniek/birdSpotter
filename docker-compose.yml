# docker-compose.yml — optional convenience file for the test Neo4j container.
# You can also start/stop the container manually; the tests do this automatically.
#
#   docker compose up -d   # start
#   docker compose down     # stop
#
# NOTE: The password below must match the one in pass.yaml under neo4j_test.password.

services:
  neo4j-test:
    image: neo4j:latest
    container_name: birdspotter-test-neo4j
    ports:
      - "7688:7687"   # Bolt
      - "7475:7474"   # HTTP (browser)
    environment:
      NEO4J_AUTH: neo4j/test_neo4j_pass_123
    restart: unless-stopped
